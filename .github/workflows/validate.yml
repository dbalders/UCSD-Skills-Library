name: public skill review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="HEAD"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="${head}^"
            fi
          fi
          git diff --name-only "$base" "$head" > changed-files.txt

      - name: Test validator
        run: python3 -m unittest discover -s tests

      - name: Validate public skills
        id: validator
        if: always()
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login || github.actor }}
        run: >-
          python3 scripts/public_skill_validator.py
          --changed-files changed-files.txt
          --contributor "$PR_AUTHOR"
          --summary public-skill-preflight.md
          --github-annotations

      - name: Check whitespace
        if: always() && steps.validator.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="${head}^"
            fi
            git diff --check "$base" "$head"
          fi

      - name: Write review summary
        if: always()
        shell: bash
        run: |
          {
            if [[ -f public-skill-preflight.md ]]; then
              cat public-skill-preflight.md
            else
              echo "# Public Skill Preflight"
              echo
              echo "Preflight stopped before writing its summary."
            fi
            echo
            echo "## AI Review"
            echo "CodeRabbit is configured in .coderabbit.yaml to review each PR update."
            echo "The optional local Codex reviewer is documented in docs/public-pr-review-service.md."
          } >> "$GITHUB_STEP_SUMMARY"
